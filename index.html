<!doctype html>
<html lang="ar" dir="rtl" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&amp;display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; }
    .app-container { height: 100%; display: flex; flex-direction: column; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
    .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
    .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 700; }
    .modal-overlay { background: rgba(0, 0, 0, 0.6); z-index: 50; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
    .gradient-badge { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .toast { animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { transform: translateX(400px); } to { transform: translateX(0); } }
    .invoice-print { background: white; padding: 40px; border-radius: 12px; }
  </style>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full m-0 p-0">
  <div id="app" class="app-container w-full">
   <header class="glass-card shadow-lg px-6 py-4 flex justify-between items-center sticky top-0 z-40 border-b">
    <div>
     <h1 id="main-title" class="text-3xl font-bold text-slate-800">يومية الاستوديو المتقدمة</h1>
     <p class="text-sm text-slate-500">لوحة إدارة احترافية</p>
    </div>
    <div class="flex items-center gap-2">
     <button onclick="openBookingModal()" class="bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white px-6 py-2 rounded-lg flex items-center gap-2 transition-all text-sm font-semibold shadow-lg"> <i data-lucide="plus-circle" class="w-5 h-5"></i> حجز جديد </button>
    </div>
   </header>
   <nav class="glass-card border-b px-6 flex gap-4 overflow-x-auto whitespace-nowrap sticky z-30" style="top: 80px;">
    <button onclick="setTab('dashboard')" id="tab-dashboard" class="py-4 font-semibold text-slate-600 hover:text-blue-600 transition-all tab-active">الرئيسية</button> <button onclick="setTab('calendar')" id="tab-calendar" class="py-4 font-semibold text-slate-600 hover:text-blue-600 transition-all">التقويم والحجوزات</button> <button onclick="setTab('daily-log')" id="tab-daily-log" class="py-4 font-semibold text-slate-600 hover:text-blue-600 transition-all">اليومية</button> <button onclick="setTab('staff')" id="tab-staff" class="py-4 font-semibold text-slate-600 hover:text-blue-600 transition-all">المصورين</button> <button onclick="setTab('packages')" id="tab-packages" class="py-4 font-semibold text-slate-600 hover:text-blue-600 transition-all">القوالب والمعدات</button>
   </nav>
   <main id="main-content" class="flex-1 p-6 overflow-y-auto">
   </main>
   <footer class="glass-card border-t p-4 text-center text-slate-500 text-sm">
    <p id="footer-note">جميع الحقوق محفوظة © 2024</p>
   </footer>
  </div>
  <div id="modal-container" class="hidden fixed inset-0 modal-overlay flex items-center justify-center p-4 overflow-y-auto">
  </div>
  <script>
    // Config & Initialization
    const defaultConfig = {
      main_title: "يومية الاستوديو المتقدمة",
      footer_note: "جميع الحقوق محفوظة © 2024"
    };

    let config = { ...defaultConfig };
    let currentTab = 'dashboard';
    let allData = [];
    let staffMembers = [];
    let venues = [
      { id: 'v1', name: 'قاعة الفيروز', pay: 1000 },
      { id: 'v2', name: 'قاعة الشافعى', pay: 800 },
      { id: 'v3', name: 'شغل الشارع', pay: 600 }
    ];

    // Default photographers
    const defaultPhotographers = [
      { name: 'محمود المراكبى', role: 'مخرج' },
      { name: 'محمد المراكبى', role: 'مخرج' },
      { name: 'محمد نادر', role: 'مصور' },
      { name: 'محمد ايهاب', role: 'مصور كرين' },
      { name: 'محمد عادل', role: 'مصور أول' },
      { name: 'محمود كوكو', role: 'مصور' },
      { name: 'السيد الشربجى', role: 'مصور' }
    ];

    // SDK Initialization
    async function initApp() {
      try {
        // Initialize Data SDK first
        if (window.dataSdk) {
          const dataHandler = {
            onDataChanged: (data) => {
              allData = data || [];
              staffMembers = allData.filter(d => d.type === 'staff');
              renderUI();
            }
          };
          const result = await window.dataSdk.init(dataHandler);
          if (!result.isOk) {
            console.error('Data SDK init failed:', result.error);
          }
        } else {
          console.error('Data SDK not available');
        }

        // Initialize Element SDK
        if (window.elementSdk) {
          window.elementSdk.init({
            defaultConfig,
            onConfigChange: async (newConfig) => {
              config = { ...config, ...newConfig };
              renderUI();
            },
            mapToCapabilities: () => ({
              recolorables: [],
              borderables: [],
              fontEditable: undefined,
              fontSizeable: undefined
            }),
            mapToEditPanelValues: (cfg) => new Map([
              ["main_title", cfg.main_title],
              ["footer_note", cfg.footer_note]
            ])
          });
        }
      } catch (err) {
        console.error('Initialization error:', err);
      }

      lucide.createIcons();
      renderUI();
    }

    function renderUI() {
      document.getElementById('main-title').textContent = config.main_title;
      document.getElementById('footer-note').textContent = config.footer_note;

      const content = document.getElementById('main-content');
      content.innerHTML = '';

      switch(currentTab) {
        case 'dashboard': renderDashboard(content); break;
        case 'calendar': renderCalendar(content); break;
        case 'daily-log': renderDailyLog(content); break;
        case 'staff': renderStaffManager(content); break;
        case 'packages': renderPackagesManager(content); break;
      }
      lucide.createIcons();
    }

    function setTab(tab) {
      currentTab = tab;
      const tabs = ['dashboard', 'calendar', 'daily-log', 'staff', 'packages'];
      tabs.forEach(t => {
        const el = document.getElementById(`tab-${t}`);
        if (el) {
          el.classList.remove('tab-active');
          el.classList.add('text-slate-600');
        }
      });
      const activeTab = document.getElementById(`tab-${tab}`);
      if (activeTab) {
        activeTab.classList.add('tab-active');
        activeTab.classList.remove('text-slate-600');
      }
      renderUI();
    }

    // DASHBOARD
    function renderDashboard(container) {
      const bookings = allData.filter(d => d.type === 'booking');
      const dailyLogs = allData.filter(d => d.type === 'daily-log');
      
      const totalRevenue = bookings.reduce((acc, curr) => acc + (Number(curr.paid_amount) || 0), 0);
      const totalRemaining = bookings.reduce((acc, curr) => acc + (Number(curr.remaining_amount) || 0), 0);
      
      container.innerHTML = `
        <div class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="glass-card p-6 rounded-2xl shadow-lg hover:shadow-xl transition-all">
              <div class="flex items-center justify-between mb-3">
                <p class="text-slate-600 text-sm font-semibold">إجمالي الحجوزات</p>
                <i data-lucide="calendar" class="w-6 h-6 text-blue-600"></i>
              </div>
              <h3 class="text-3xl font-bold text-slate-800">${bookings.length}</h3>
              <p class="text-xs text-slate-500 mt-2">من بداية النشاط</p>
            </div>

            <div class="glass-card p-6 rounded-2xl shadow-lg hover:shadow-xl transition-all">
              <div class="flex items-center justify-between mb-3">
                <p class="text-slate-600 text-sm font-semibold">المحصل</p>
                <i data-lucide="check-circle" class="w-6 h-6 text-green-600"></i>
              </div>
              <h3 class="text-3xl font-bold text-green-600">${totalRevenue.toLocaleString()} ج.م</h3>
              <p class="text-xs text-slate-500 mt-2">دفع بالفعل</p>
            </div>

            <div class="glass-card p-6 rounded-2xl shadow-lg hover:shadow-xl transition-all">
              <div class="flex items-center justify-between mb-3">
                <p class="text-slate-600 text-sm font-semibold">المتبقي</p>
                <i data-lucide="alert-circle" class="w-6 h-6 text-amber-600"></i>
              </div>
              <h3 class="text-3xl font-bold text-amber-600">${totalRemaining.toLocaleString()} ج.م</h3>
              <p class="text-xs text-slate-500 mt-2">تحت التحصيل</p>
            </div>

            <div class="glass-card p-6 rounded-2xl shadow-lg hover:shadow-xl transition-all">
              <div class="flex items-center justify-between mb-3">
                <p class="text-slate-600 text-sm font-semibold">اليوميات</p>
                <i data-lucide="clipboard-list" class="w-6 h-6 text-purple-600"></i>
              </div>
              <h3 class="text-3xl font-bold text-purple-600">${dailyLogs.length}</h3>
              <p class="text-xs text-slate-500 mt-2">تسجيل يومي</p>
            </div>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="glass-card p-6 rounded-2xl shadow-lg">
              <h3 class="font-bold text-lg text-slate-800 mb-4 flex items-center gap-2">
                <i data-lucide="trending-up" class="w-5 h-5 text-blue-600"></i>
                آخر الحجوزات
              </h3>
              <div class="space-y-3 max-h-80 overflow-y-auto">
                ${bookings.slice(-5).reverse().map(b => `
                  <div class="p-4 border-l-4 border-blue-400 bg-blue-50 rounded-r-lg hover:bg-blue-100 transition-all">
                    <div class="font-bold text-slate-800">${b.client_name}</div>
                    <div class="text-xs text-slate-500 mt-1">${b.date}</div>
                    <div class="text-xs text-blue-600 font-semibold mt-2">المبلغ: ${b.total_amount} ج.م | المدفوع: ${b.paid_amount} ج.م</div>
                  </div>
                `).join('') || '<p class="text-center py-6 text-slate-400">لا توجد حجوزات</p>'}
              </div>
            </div>

            <div class="glass-card p-6 rounded-2xl shadow-lg">
              <h3 class="font-bold text-lg text-slate-800 mb-4 flex items-center gap-2">
                <i data-lucide="users" class="w-5 h-5 text-purple-600"></i>
                المصورين النشطين
              </h3>
              <div class="space-y-3 max-h-80 overflow-y-auto">
                ${staffMembers.slice(0, 8).map(staff => {
                  const staffBookings = allData.filter(b => b.type === 'booking' && b.photographers_list?.includes(staff.staff_name));
                  return `
                    <div class="p-3 bg-gradient-to-r from-purple-50 to-purple-100 rounded-lg">
                      <div class="flex justify-between items-center">
                        <span class="font-semibold text-slate-800">${staff.staff_name}</span>
                        <span class="px-3 py-1 bg-purple-200 text-purple-800 rounded-full font-bold text-xs">${staffBookings.length} حجز</span>
                      </div>
                    </div>
                  `;
                }).join('') || '<p class="text-center py-6 text-slate-400">لم يتم إضافة مصورين بعد</p>'}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // CALENDAR
    function renderCalendar(container) {
      const bookings = allData.filter(d => d.type === 'booking');
      
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const upcomingBookings = bookings
        .filter(b => new Date(b.date) >= today)
        .sort((a, b) => new Date(a.date) - new Date(b.date));

      const currentMonth = new Date();
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const daysInMonth = lastDay.getDate();
      const startingDayOfWeek = firstDay.getDay();
      
      const monthNames = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 
                         'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];

      container.innerHTML = `
        <div class="flex flex-col lg:flex-row gap-8">
          <div class="flex-1">
            <div class="glass-card p-6 rounded-2xl shadow-lg">
              <h2 class="text-2xl font-bold text-slate-800 mb-6">${monthNames[month]} ${year}</h2>
              
              <div class="grid grid-cols-7 gap-2 mb-4">
                ${['ح', 'ن', 'ث', 'ع', 'خ', 'ج', 'س'].map(d => 
                  `<div class="text-center text-xs font-bold text-slate-500 p-3 bg-slate-100 rounded">${d}</div>`
                ).join('')}
              </div>
              
              <div class="grid grid-cols-7 gap-2">
                ${Array.from({length: startingDayOfWeek}).map(() => 
                  `<div class="aspect-square"></div>`
                ).join('')}
                
                ${Array.from({length: daysInMonth}).map((_, i) => {
                  const day = i + 1;
                  const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                  const dayBookings = bookings.filter(b => b.date === dateStr);
                  const isToday = new Date().toISOString().split('T')[0] === dateStr;
                  
                  return `<button onclick="openBookingModalWithDate('${dateStr}')" 
                    class="aspect-square border-2 rounded-lg p-2 flex flex-col items-center justify-between hover:border-blue-300 hover:bg-blue-50 transition-all ${dayBookings.length > 0 ? 'bg-blue-50 border-blue-300' : 'border-slate-300'} ${isToday ? 'ring-2 ring-blue-500' : ''}">
                    <span class="text-xs font-bold ${dayBookings.length > 0 ? 'text-blue-600' : 'text-slate-500'}">${day}</span>
                    ${dayBookings.length > 0 ? `<span class="text-xs text-blue-600 font-semibold">${dayBookings.length}</span>` : ''}
                  </button>`;
                }).join('')}
              </div>
            </div>
          </div>

          <div class="w-full lg:w-96 space-y-6">
            <div class="glass-card p-6 rounded-2xl shadow-lg bg-gradient-to-br from-red-600 to-red-700 text-white">
              <h3 class="font-bold mb-4 flex items-center gap-2">
                <i data-lucide="alert-circle" class="w-5 h-5"></i>
                المواعيد القادمة
              </h3>
              <div class="space-y-2 max-h-80 overflow-y-auto">
                ${upcomingBookings.slice(0, 8).map(b => `
                  <button onclick="openClientDetails('${b.__backendId}')" class="w-full text-right p-3 bg-red-50 hover:bg-red-100 rounded-lg transition-all border-r-4 border-red-400 hover:border-red-500">
                    <div class="font-bold text-slate-900 text-sm">${b.client_name}</div>
                    <div class="text-xs text-red-700 mt-1">📅 ${b.date}</div>
                    <div class="text-xs font-semibold text-red-600 mt-1">المبلغ: ${b.total_amount} ج.م</div>
                  </button>
                `).join('') || '<p class="text-center py-6 text-red-200">لا توجد مواعيد قادمة</p>'}
              </div>
            </div>

            <div class="glass-card p-6 rounded-2xl shadow-lg bg-gradient-to-br from-blue-600 to-blue-700 text-white">
              <h3 class="font-bold mb-4">إحصائيات الشهر</h3>
              <div class="space-y-2">
                <div class="flex justify-between pb-2 border-b border-blue-400">
                  <span>إجمالي الحجوزات</span>
                  <span class="font-bold">${bookings.length}</span>
                </div>
                <div class="flex justify-between pb-2 border-b border-blue-400">
                  <span>أيام بها حجوزات</span>
                  <span class="font-bold">${new Set(bookings.map(b => b.date)).size}</span>
                </div>
                <div class="flex justify-between">
                  <span>متوسط يومي</span>
                  <span class="font-bold">${Math.round(bookings.length / Math.max(new Set(bookings.map(b => b.date)).size, 1))}</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // DAILY LOG
    function renderDailyLog(container) {
      const dailyLogs = allData.filter(d => d.type === 'daily-log');
      
      container.innerHTML = `
        <div class="space-y-6">
          <div class="flex justify-between items-center">
            <div>
              <h2 class="text-2xl font-bold text-slate-800">سجل اليوميات</h2>
              <p class="text-sm text-slate-500 mt-1">تتبع إيرادات الأماكن والمصورين</p>
            </div>
            <button onclick="openDailyLogModal()" class="bg-gradient-to-r from-green-600 to-green-700 hover:from-green-700 hover:to-green-800 text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 transition-all shadow-lg">
              <i data-lucide="plus" class="w-5 h-5"></i> تسجيل يومية
            </button>
          </div>

          <!-- Statistics -->
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            ${venues.map(venue => {
              const venueLogs = dailyLogs.filter(d => d.venue_name === venue.name);
              const totalRevenue = venueLogs.reduce((acc, curr) => acc + (Number(curr.venue_revenue) || 0), 0);
              const netRevenue = totalRevenue - (venueLogs.length * venue.pay);
              
              return `
                <div class="glass-card p-6 rounded-2xl shadow-lg hover:shadow-xl transition-all">
                  <div class="flex items-center justify-between mb-4">
                    <h3 class="font-bold text-slate-800 text-lg">${venue.name}</h3>
                    <i data-lucide="map-pin" class="w-6 h-6 text-amber-600"></i>
                  </div>
                  <div class="space-y-2">
                    <div class="flex justify-between p-2 bg-blue-50 rounded">
                      <span class="text-xs text-slate-600">الإيرادات</span>
                      <span class="font-bold text-blue-600">${totalRevenue} ج.م</span>
                    </div>
                    <div class="flex justify-between p-2 bg-amber-50 rounded">
                      <span class="text-xs text-slate-600">عبض المكان</span>
                      <span class="font-bold text-amber-600">${venue.pay * venueLogs.length} ج.م</span>
                    </div>
                    <div class="flex justify-between p-2 bg-green-50 rounded">
                      <span class="text-xs text-slate-600">الصافي</span>
                      <span class="font-bold text-green-600">${netRevenue} ج.م</span>
                    </div>
                    <div class="text-xs text-slate-500 mt-2">عدد التسجيلات: ${venueLogs.length}</div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>

          <!-- Logs Table -->
          <div class="glass-card rounded-2xl shadow-lg overflow-hidden">
            <div class="p-4 bg-gradient-to-r from-slate-100 to-slate-200 border-b">
              <h3 class="font-bold text-slate-800 flex items-center gap-2">
                <i data-lucide="list" class="w-5 h-5"></i>
                جميع اليوميات
              </h3>
            </div>
            <div class="overflow-x-auto">
              <table class="w-full text-right text-sm">
                <thead class="bg-slate-50 border-b">
                  <tr>
                    <th class="p-4 text-slate-600">التاريخ</th>
                    <th class="p-4 text-slate-600">المكان</th>
                    <th class="p-4 text-slate-600">الإيرادات</th>
                    <th class="p-4 text-slate-600">العبض</th>
                    <th class="p-4 text-slate-600">الصافي</th>
                    <th class="p-4 text-slate-600">المصورين</th>
                    <th class="p-4 text-slate-600">الإجراء</th>
                  </tr>
                </thead>
                <tbody>
                  ${dailyLogs.slice().reverse().map(log => {
                    const venue = venues.find(v => v.name === log.venue_name);
                    const venueShare = venue ? venue.pay : 0;
                    return `
                      <tr class="border-t hover:bg-blue-50 transition-all">
                        <td class="p-4 font-bold">${log.log_date}</td>
                        <td class="p-4"><span class="px-3 py-1 bg-amber-100 text-amber-800 rounded-full text-xs font-bold">${log.venue_name}</span></td>
                        <td class="p-4 font-bold text-green-600">${log.venue_revenue} ج.م</td>
                        <td class="p-4 text-amber-600 font-bold">${venueShare} ج.م</td>
                        <td class="p-4 font-bold text-green-600">${Number(log.venue_revenue) - venueShare} ج.م</td>
                        <td class="p-4 text-xs">
                          <div class="flex flex-wrap gap-1">
                            ${log.photographer_list?.split(',').map(p => `<span class="px-2 py-0.5 bg-blue-100 text-blue-700 rounded text-xs">${p.trim()}</span>`).join('') || '-'}
                          </div>
                        </td>
                        <td class="p-4">
                          <button onclick="deleteRecord('${log.__backendId}')" class="text-red-500 hover:text-red-700 hover:bg-red-50 p-2 rounded transition-all">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                          </button>
                        </td>
                      </tr>
                    `;
                  }).join('') || '<tr><td colspan="7" class="p-8 text-center text-slate-400">لا توجد تسجيلات</td></tr>'}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;
    }

    // STAFF MANAGER
    function renderStaffManager(container) {
      container.innerHTML = `
        <div class="space-y-6">
          <div class="flex justify-between items-center">
            <div>
              <h2 class="text-2xl font-bold text-slate-800">إدارة المصورين</h2>
              <p class="text-sm text-slate-500 mt-1">أضف وأدر المصورين وتتبع أدائهم</p>
            </div>
            <button onclick="openStaffModal()" class="bg-gradient-to-r from-purple-600 to-purple-700 hover:from-purple-700 hover:to-purple-800 text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 transition-all shadow-lg">
              <i data-lucide="plus" class="w-5 h-5"></i> إضافة مصور
            </button>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            ${staffMembers.length > 0 ? staffMembers.map(staff => {

    function switchPhotographerTab(tab) {

      tabs.forEach(t => {

        const content = document.getElementById(`photo-content-${t}`);
        if (tabBtn) tabBtn.classList.remove('text-blue-600', 'border-blue-600');
        if (tabBtn) tabBtn.classList.add('text-slate-600', 'border-transparent');
        if (content) content.classList.add('hidden');
      });
      
      const activeBtn = document.getElementById(`photo-tab-${tab}`);
      const activeContent = document.getElementById(`photo-content-${tab}`);
      if (activeBtn) {
        activeBtn.classList.remove('text-slate-600', 'border-transparent');

    async function handleExcuseRequest(e, staffName) {
      e.preventDefault();
      const form = e.target;
      const formData = new FormData(form);
      
      const data = {
        type: 'message',
        message_from: staffName,
        message_to: 'إدارة',
        message_type: 'excuse_request',
        message_content: `${formData.get('excuse_type')}: ${formData.get('excuse_date')} - ${formData.get('excuse_reason')}`,
        message_date: new Date().toISOString().split('T')[0]
      };

      if (!window.dataSdk) return showError('خطأ: قاعدة البيانات غير متاحة');

      const result = await window.dataSdk.create(data);
      if (result.isOk) {
        showSuccess('✅ تم إرسال طلبك بنجاح! ستتم مراجعته من قبل الإدارة');
        setTimeout(() => openStaffPortal(staffName), 2000);
      } else {
        showError('خطأ في الإرسال');
      }
    }

    function copyPortalLink(portalLink) {
      const link = `${window.location.origin}?portal=${portalLink}`;
      const textarea = document.createElement('textarea');
      textarea.value = link;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      showSuccess('تم نسخ الرابط بنجاح!');
    }

    async function handleBooking(e) {
      e.preventDefault();
      
      if (!window.dataSdk) {
        showError('⚠️ البرنامج لم يتم تحميله بشكل صحيح. حاول تحديث الصفحة.');
        return;
      }

      const form = e.target;
      const formData = new FormData(form);
      const photographers = Array.from(form.querySelectorAll('input[name="photographers"]:checked')).map(cb => cb.value).join(', ');
      
      const data = {
        type: 'booking',
        client_name: formData.get('client_name'),
        phone: formData.get('phone'),
        address: formData.get('address'),
        date: formData.get('date'),
        venue: 'عام',
        package: formData.get('package'),
        total_amount: Number(formData.get('total_amount')),
        paid_amount: Number(formData.get('paid_amount')),
        remaining_amount: Number(formData.get('total_amount')) - Number(formData.get('paid_amount')),
        photographers_list: photographers,
        status: 'مؤكد'
      };

      if (allData.length >= 999) {
        showError('❌ تم الوصول للحد الأقصى من السجلات (999)');
        return;
      }

      try {
        const result = await window.dataSdk.create(data);
        if (result.isOk) {
          closeModal();
          showSuccess('✅ تم حفظ الحجز بنجاح!');
        } else {
          showError('❌ خطأ: ' + (result.error?.message || 'فشل حفظ البيانات'));
        }
      } catch (err) {
        showError('❌ خطأ: ' + err.message);
      }
    }
