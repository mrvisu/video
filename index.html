<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الاستوديو المطور</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'studio-pro-v2';

        window.fb = { 
            auth, db, appId, collection, doc, setDoc, onSnapshot, deleteDoc, query, where, 
            signInAnonymously, signInWithCustomToken, onAuthStateChanged 
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.26, 0.53, 0.74, 1.48); }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home');
            const [staffId, setStaffId] = useState(null);
            const [data, setData] = useState({ bookings: [], logs: [], staff: [], services: [] });
            const [selectedEntity, setSelectedEntity] = useState(null);

            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const sId = urlParams.get('staff');
                if (sId) {
                    setStaffId(sId);
                    setView('staff_portal');
                }

                const { auth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.fb;

                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("Auth Initialization Error:", error);
                    }
                };

                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                });

                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const { db, appId, collection, onSnapshot } = window.fb;

                const sync = (colName, key) => {
                    const q = collection(db, 'artifacts', appId, 'public', 'data', colName);
                    return onSnapshot(q, (snap) => {
                        setData(prev => ({ ...prev, [key]: snap.docs.map(d => ({ id: d.id, ...d.data() })) }));
                    }, (err) => console.error(`Sync error ${colName}:`, err));
                };

                const unsubs = [
                    sync('bookings', 'bookings'), 
                    sync('dailyLogs', 'logs'), 
                    sync('staff', 'staff'), 
                    sync('services', 'services')
                ];
                return () => unsubs.forEach(u => u());
            }, [user]);

            const globalStats = useMemo(() => {
                const income = data.logs.reduce((s, l) => s + Number(l.collectedAmount || 0), 0);
                const expense = data.logs.reduce((s, l) => s + Number(l.totalExpenses || 0), 0);
                return { income, expense, net: income - expense };
            }, [data.logs]);

            const save = async (col, item, id = Math.random().toString(36).substr(2, 9)) => {
                if (!user) return;
                const { db, appId, doc, setDoc } = window.fb;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', col, id), item);
            };

            const remove = async (col, id) => {
                if (!user) return;
                const { db, appId, doc, deleteDoc } = window.fb;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', col, id));
            };

            if (view === 'staff_portal') return <StaffPortal staffId={staffId} data={data} onBack={() => { window.history.pushState({}, '', '/'); setView('home'); }} />;

            return (
                <div className="min-h-screen">
                    {view === 'home' ? (
                        <div className="flex flex-col items-center justify-center h-screen bg-slate-900 text-white p-6 text-center">
                            <h1 className="text-5xl font-black mb-4 text-emerald-400">STUDIO PRO</h1>
                            <p className="mb-12 text-slate-400">نظام إدارة المحتوى السحابي الذكي</p>
                            {!user && <div className="mb-4 animate-pulse text-amber-400 text-sm">جاري الاتصال بالسحابة...</div>}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl">
                                <button onClick={() => setView('admin')} className="p-8 bg-slate-800 rounded-3xl border border-slate-700 hover:border-emerald-500 transition-all text-2xl font-bold">دخول المدير</button>
                                <div className="p-8 bg-slate-800 rounded-3xl border border-slate-700">
                                    <p className="text-sm mb-4 text-slate-400">بوابة المصورين (اختر للدخول)</p>
                                    <select onChange={(e) => { 
                                        const id = e.target.value;
                                        if(!id) return;
                                        window.history.pushState({}, '', `?staff=${id}`);
                                        setStaffId(id); setView('staff_portal');
                                    }} className="w-full p-3 bg-slate-900 border border-slate-600 rounded-xl outline-none">
                                        <option value="">-- اختر مصوراً --</option>
                                        {data.staff.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                    </select>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="flex flex-col md:flex-row h-screen">
                            <aside className="w-full md:w-64 bg-slate-900 text-white p-6">
                                <h2 className="text-2xl font-black text-emerald-400 mb-8">لوحة التحكم</h2>
                                <nav className="space-y-4">
                                    <button onClick={() => setView('admin')} className="w-full text-right p-3 hover:bg-slate-800 rounded-xl block">🏠 اليومية والمحاسبة</button>
                                    <button onClick={() => setView('bookings')} className="w-full text-right p-3 hover:bg-slate-800 rounded-xl block">📅 الحجوزات القادمة</button>
                                    <button onClick={() => setView('settings')} className="w-full text-right p-3 hover:bg-slate-800 rounded-xl block">⚙️ إعدادات الطاقم</button>
                                    <button onClick={() => setView('home')} className="w-full text-right p-3 text-red-400 hover:bg-red-500/10 rounded-xl block mt-10">🚪 خروج</button>
                                </nav>
                            </aside>

                            <main className="flex-1 overflow-y-auto bg-slate-50 p-6">
                                {view === 'admin' && <AccountingView stats={globalStats} data={data} save={save} remove={remove} />}
                                {view === 'bookings' && <BookingsView data={data} save={save} remove={remove} onClientClick={setSelectedEntity} />}
                                {view === 'settings' && <SettingsView data={data} save={save} remove={remove} />}
                            </main>
                        </div>
                    )}

                    {selectedEntity && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4" onClick={() => setSelectedEntity(null)}>
                            <div className="bg-white rounded-3xl p-8 max-w-lg w-full animate-pop shadow-2xl" onClick={e => e.stopPropagation()}>
                                <h3 className="text-2xl font-black mb-4 border-b pb-2">تفاصيل العميل</h3>
                                <div className="space-y-4 text-slate-700">
                                    <p><strong className="text-slate-900">الاسم:</strong> {selectedEntity.clientName}</p>
                                    <p><strong className="text-slate-900">الهاتف:</strong> {selectedEntity.phone}</p>
                                    <p><strong className="text-slate-900">العنوان:</strong> {selectedEntity.address}</p>
                                    <p><strong className="text-slate-900">تاريخ الحجز:</strong> {selectedEntity.date}</p>
                                    <p><strong className="text-slate-900">المكان المسجل:</strong> {selectedEntity.location}</p>
                                    <div className="p-4 bg-slate-50 rounded-2xl border">
                                        <p className="font-bold mb-2">الخدمات:</p>
                                        <ul className="list-disc list-inside text-sm">
                                            {selectedEntity.services?.map((s,i) => <li key={i}>{s.name} - {s.price} ج.م</li>)}
                                        </ul>
                                    </div>
                                    <div className="flex justify-between items-center pt-4">
                                        <div className="text-red-600 font-black">المتبقي: {selectedEntity.remainingAmount} ج.م</div>
                                        <button onClick={() => setSelectedEntity(null)} className="px-6 py-2 bg-slate-900 text-white rounded-xl">إغلاق</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // Views Components
        const AccountingView = ({ stats, data, save, remove }) => {
            const [showModal, setShowModal] = useState(false);
            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-white p-6 rounded-3xl shadow-sm border-b-4 border-emerald-500">
                            <p className="text-slate-500 text-sm font-bold">إجمالي الإيرادات</p>
                            <h3 className="text-3xl font-black text-slate-900">{stats.income} ج.م</h3>
                        </div>
                        <div className="bg-white p-6 rounded-3xl shadow-sm border-b-4 border-red-500">
                            <p className="text-slate-500 text-sm font-bold">إجمالي المصروفات</p>
                            <h3 className="text-3xl font-black text-slate-900">{stats.expense} ج.م</h3>
                        </div>
                        <div className="bg-white p-6 rounded-3xl shadow-sm border-b-4 border-blue-500">
                            <p className="text-slate-500 text-sm font-bold">صافي الأرباح</p>
                            <h3 className="text-3xl font-black text-slate-900">{stats.net} ج.م</h3>
                        </div>
                    </div>
                    <div className="bg-white rounded-3xl p-6 shadow-sm">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-xl font-black">سجل اليومية والمحاسبة</h2>
                            <button onClick={() => setShowModal(true)} className="bg-emerald-600 text-white px-6 py-2 rounded-xl font-bold">+ إضافة عملية</button>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-right">
                                <thead>
                                    <tr className="border-b text-slate-400 text-sm">
                                        <th className="p-3">التاريخ</th>
                                        <th className="p-3">المكان</th>
                                        <th className="p-3">المحصل</th>
                                        <th className="p-3">المصاريف</th>
                                        <th className="p-3">الصافي</th>
                                        <th className="p-3"></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {data.logs.map(log => (
                                        <tr key={log.id} className="border-b hover:bg-slate-50">
                                            <td className="p-3 font-bold">{log.date}</td>
                                            <td className="p-3">{log.location}</td>
                                            <td className="p-3 text-emerald-600 font-bold">{log.collectedAmount}</td>
                                            <td className="p-3 text-red-500 font-bold">{log.totalExpenses}</td>
                                            <td className="p-3 text-blue-600 font-black">{log.collectedAmount - log.totalExpenses}</td>
                                            <td className="p-3 text-left">
                                                <button onClick={() => remove('dailyLogs', log.id)} className="text-red-400 hover:text-red-600">حذف</button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    {showModal && <DailyModal data={data} onSave={(d) => { save('dailyLogs', d); setShowModal(false); }} onClose={() => setShowModal(false)} />}
                </div>
            );
        };

        const BookingsView = ({ data, save, remove, onClientClick }) => {
            const [showModal, setShowModal] = useState(false);
            const today = new Date().toISOString().split('T')[0];
            const upcoming = data.bookings
                .filter(b => b.date >= today)
                .sort((a,b) => a.date.localeCompare(b.date));

            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-1 space-y-4">
                            <h3 className="text-lg font-black text-slate-800">تذكير المواعيد القريبة</h3>
                            {upcoming.slice(0, 5).map(b => (
                                <div key={b.id} onClick={() => onClientClick(b)} className="bg-white border border-slate-200 p-4 rounded-2xl cursor-pointer hover:border-emerald-500 transition-all shadow-sm">
                                    <div className="flex justify-between items-center mb-2">
                                        <span className={`text-xs font-bold px-2 py-1 rounded-lg border ${b.date === today ? 'bg-red-50 text-red-600 border-red-100' : 'bg-emerald-50 text-emerald-600 border-emerald-100'}`}>
                                            {b.date === today ? 'اليوم!' : b.date}
                                        </span>
                                        <span className="text-xs text-slate-500">{b.location}</span>
                                    </div>
                                    <p className="font-bold text-slate-800">{b.clientName}</p>
                                </div>
                            ))}
                        </div>
                        <div className="lg:col-span-2 bg-white p-6 rounded-3xl shadow-sm h-fit">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-xl font-black">كافة الحجوزات</h2>
                                <button onClick={() => setShowModal(true)} className="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">+ حجز جديد</button>
                            </div>
                            <div className="space-y-4">
                                {data.bookings.map(b => (
                                    <div key={b.id} className="flex items-center justify-between p-4 border rounded-2xl hover:border-blue-400 transition-colors">
                                        <div className="flex gap-4 items-center">
                                            <div className="bg-blue-50 p-3 rounded-xl text-blue-600 font-bold text-center leading-tight">
                                                {b.date.split('-')[2]}<br/>
                                                <span className="text-[10px]">{b.date.split('-')[1]}</span>
                                            </div>
                                            <div>
                                                <button onClick={() => onClientClick(b)} className="font-black text-slate-800 hover:text-blue-600">{b.clientName}</button>
                                                <p className="text-xs text-slate-400">{b.phone}</p>
                                            </div>
                                        </div>
                                        <button onClick={() => remove('bookings', b.id)} className="p-2 text-red-400 hover:bg-red-50 rounded-lg">حذف</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                    {showModal && <BookingModal data={data} onSave={(d) => { save('bookings', d); setShowModal(false); }} onClose={() => setShowModal(false)} />}
                </div>
            );
        };

        const SettingsView = ({ data, save, remove }) => {
            const addStaff = (e) => {
                e.preventDefault();
                const f = new FormData(e.target);
                const name = f.get('name');
                const rate = f.get('rate');
                if(!name || !rate) return;
                save('staff', { name, rate: Number(rate) });
                e.target.reset();
            };

            return (
                <div className="max-w-4xl space-y-8">
                    <div className="bg-white p-8 rounded-3xl shadow-sm">
                        <h2 className="text-2xl font-black mb-6">إعدادات طاقم التصوير</h2>
                        <form onSubmit={addStaff} className="flex gap-4 mb-8">
                            <input name="name" required placeholder="اسم المصور" className="flex-1 p-3 border rounded-xl outline-none" />
                            <input name="rate" required type="number" placeholder="الأجر" className="w-32 p-3 border rounded-xl outline-none" />
                            <button className="bg-slate-900 text-white px-8 py-3 rounded-xl font-bold">إضافة</button>
                        </form>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {data.staff.map(s => (
                                <div key={s.id} className="p-4 border rounded-2xl flex justify-between items-center group">
                                    <div>
                                        <p className="font-bold">{s.name}</p>
                                        <p className="text-xs text-emerald-600">الأجر الافتراضي: {s.rate} ج.م</p>
                                        <code className="text-[10px] text-slate-400 block mt-2 select-all">?staff={s.id}</code>
                                    </div>
                                    <button onClick={() => remove('staff', s.id)} className="text-red-400 opacity-0 group-hover:opacity-100 transition-opacity p-2">حذف</button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const BookingModal = ({ data, onSave, onClose }) => {
            const [form, setForm] = useState({ 
                clientName: '', phone: '', address: '', date: '', location: '', 
                paidAmount: 0, services: [] 
            });

            const [customServices, setCustomServices] = useState([
                { id: '1', name: 'تصوير فوتوغرافى', price: 1500 },
                { id: '2', name: 'تصوير فيديو', price: 2000 },
                { id: '3', name: 'ألبوم صور', price: 800 }
            ]);

            const total = form.services.reduce((s, x) => s + Number(x.price), 0);

            const toggleSrv = (srv) => {
                const exists = form.services.find(s => s.id === srv.id);
                setForm({ ...form, services: exists ? form.services.filter(s => s.id !== srv.id) : [...form.services, srv] });
            };

            const updatePrice = (id, newPrice) => {
                const price = Number(newPrice);
                setCustomServices(customServices.map(s => s.id === id ? {...s, price} : s));
                setForm(prev => ({
                    ...prev,
                    services: prev.services.map(s => s.id === id ? {...s, price} : s)
                }));
            };

            return (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 overflow-y-auto">
                    <div className="bg-white rounded-3xl p-8 max-w-2xl w-full animate-pop my-auto">
                        <h2 className="text-2xl font-black mb-6">حجز جديد</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                            <input placeholder="اسم العميل" className="p-3 border rounded-xl" value={form.clientName} onChange={e => setForm({...form, clientName: e.target.value})} />
                            <input placeholder="رقم الهاتف" className="p-3 border rounded-xl" value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} />
                            <input placeholder="العنوان" className="p-3 border rounded-xl col-span-full" value={form.address} onChange={e => setForm({...form, address: e.target.value})} />
                            <input type="date" className="p-3 border rounded-xl font-bold" value={form.date} onChange={e => setForm({...form, date: e.target.value})} />
                            <input placeholder="القاعة / المكان" className="p-3 border rounded-xl" value={form.location} onChange={e => setForm({...form, location: e.target.value})} />
                        </div>
                        <div className="mb-6">
                            <p className="font-bold mb-3">الخدمات الأساسية (عدل السعر):</p>
                            <div className="space-y-2">
                                {customServices.map(s => (
                                    <div key={s.id} className="flex items-center gap-4 bg-slate-50 p-3 rounded-2xl border">
                                        <input type="checkbox" className="w-5 h-5 accent-emerald-600" onChange={() => toggleSrv(s)} checked={!!form.services.find(x => x.id === s.id)} />
                                        <span className="flex-1 font-bold">{s.name}</span>
                                        <input type="number" value={s.price} onChange={e => updatePrice(s.id, e.target.value)} className="w-24 p-1 border rounded text-center font-bold text-blue-600" />
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="bg-slate-900 p-6 rounded-3xl text-white mb-6">
                            <div className="flex justify-between mb-2 opacity-70"><span>الإجمالي:</span><span>{total} ج.م</span></div>
                            <div className="flex justify-between items-center gap-4">
                                <span>المدفوع حالياً:</span>
                                <input type="number" className="bg-slate-800 border-none p-2 rounded-xl text-emerald-400 font-bold w-32 text-center" value={form.paidAmount} onChange={e => setForm({...form, paidAmount: Number(e.target.value)})} />
                            </div>
                            <div className="flex justify-between items-center mt-4 pt-4 border-t border-slate-800">
                                <span className="font-bold">المتبقي:</span><span className="text-2xl font-black text-red-400">{total - form.paidAmount} ج.م</span>
                            </div>
                        </div>
                        <div className="flex gap-4">
                            <button onClick={() => onSave({ ...form, totalAmount: total, remainingAmount: total - form.paidAmount })} className="flex-1 bg-emerald-600 text-white py-4 rounded-2xl font-bold hover:bg-emerald-700 transition-colors">تأكيد الحجز</button>
                            <button onClick={onClose} className="px-8 bg-slate-200 py-4 rounded-2xl font-bold hover:bg-slate-300">إلغاء</button>
                        </div>
                    </div>
                </div>
            );
        };

        const DailyModal = ({ data, onSave, onClose }) => {
            const [form, setForm] = useState({ date: new Date().toISOString().split('T')[0], location: '', collectedAmount: 0, totalExpenses: 0, staff: [], expenses: [] });
            const [newExp, setNewExp] = useState({ desc: '', amount: 0 });

            const addStaff = (sId) => {
                const s = data.staff.find(x => x.id === sId);
                if (s && !form.staff.find(x => x.id === sId)) {
                    const newStaffList = [...form.staff, { id: s.id, name: s.name, rate: s.rate }];
                    const newExpTotal = newStaffList.reduce((a,b)=>a+b.rate, 0) + form.expenses.reduce((a,b)=>a+b.amount,0);
                    setForm({ ...form, staff: newStaffList, totalExpenses: newExpTotal });
                }
            };

            const addExp = () => {
                if (!newExp.desc || !newExp.amount) return;
                const newExpenses = [...form.expenses, newExp];
                const newExpTotal = form.staff.reduce((a,b)=>a+b.rate, 0) + newExpenses.reduce((a,b)=>a+b.amount,0);
                setForm({ ...form, expenses: newExpenses, totalExpenses: newExpTotal });
                setNewExp({ desc: '', amount: 0 });
            };

            return (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 overflow-y-auto">
                    <div className="bg-white rounded-3xl p-8 max-w-xl w-full animate-pop my-auto">
                        <h2 className="text-2xl font-black mb-6">تسجيل إيراد يومية</h2>
                        <div className="grid grid-cols-2 gap-4 mb-6">
                            <div className="col-span-2">
                                <label className="text-xs font-bold text-slate-400 px-2">مكان العمل (القاعة / المناسبة)</label>
                                <input placeholder="مثلاً: قاعة الأميرة" className="w-full p-3 border rounded-xl" value={form.location} onChange={e => setForm({...form, location: e.target.value})} />
                            </div>
                            <div>
                                <label className="text-xs font-bold text-slate-400 px-2">المبلغ المحصل</label>
                                <input type="number" className="w-full p-3 border rounded-xl font-bold text-emerald-600" value={form.collectedAmount} onChange={e => setForm({...form, collectedAmount: Number(e.target.value)})} />
                            </div>
                            <div>
                                <label className="text-xs font-bold text-slate-400 px-2">التاريخ</label>
                                <input type="date" value={form.date} className="w-full p-3 border rounded-xl" onChange={e => setForm({...form, date: e.target.value})} />
                            </div>
                        </div>
                        <div className="mb-6 p-4 bg-slate-50 rounded-2xl border">
                            <p className="font-bold mb-2 text-sm">طاقم العمل المشارك:</p>
                            <select className="w-full p-2 mb-3 rounded-lg border bg-white" onChange={e => addStaff(e.target.value)}>
                                <option value="">+ اختر مصوراً</option>
                                {data.staff.map(s => <option key={s.id} value={s.id}>{s.name} ({s.rate} ج)</option>)}
                            </select>
                            <div className="flex flex-wrap gap-2">
                                {form.staff.map(s => <span key={s.id} className="bg-white border px-3 py-1 rounded-full text-xs font-bold text-slate-600 shadow-sm">{s.name}</span>)}
                            </div>
                        </div>
                        <div className="mb-6 p-4 bg-slate-50 rounded-2xl border">
                            <p className="font-bold mb-2 text-sm">مصاريف نثرية (إيجار/معدات):</p>
                            <div className="flex gap-2">
                                <input placeholder="البيان" className="flex-1 p-2 border rounded-lg text-sm" value={newExp.desc} onChange={e => setNewExp({...newExp, desc: e.target.value})} />
                                <input type="number" placeholder="المبلغ" className="w-20 p-2 border rounded-lg text-sm" value={newExp.amount} onChange={e => setNewExp({...newExp, amount: Number(e.target.value)})} />
                                <button onClick={addExp} className="bg-slate-900 text-white px-3 rounded-lg text-xs font-bold">إضافة</button>
                            </div>
                        </div>
                        <div className="text-center p-6 bg-blue-50 rounded-3xl border border-blue-100 mb-6">
                            <p className="text-xs font-bold text-blue-600 uppercase tracking-wider mb-1">الصافي المحقق</p>
                            <h3 className="text-4xl font-black text-slate-900">{form.collectedAmount - form.totalExpenses} ج.م</h3>
                        </div>
                        <div className="flex gap-4">
                            <button onClick={() => onSave(form)} className="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-slate-800 transition-all">حفظ العملية</button>
                            <button onClick={onClose} className="px-8 bg-slate-200 py-4 rounded-2xl font-bold hover:bg-slate-300">إلغاء</button>
                        </div>
                    </div>
                </div>
            );
        };

        const StaffPortal = ({ staffId, data, onBack }) => {
            const member = data.staff.find(s => s.id === staffId);
            const myWork = data.logs.filter(l => l.staff?.some(s => s.id === staffId));
            const totalEarned = myWork.reduce((s, l) => s + (l.staff.find(x => x.id === staffId)?.rate || 0), 0);
            
            const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
            const tomorrowStr = tomorrow.toISOString().split('T')[0];
            const hasJobTomorrow = data.bookings.find(b => b.date === tomorrowStr);

            if (!member) return <div className="p-20 text-center font-bold text-slate-400 animate-pulse">جاري التحقق من الهوية...</div>;

            return (
                <div className="min-h-screen bg-slate-50">
                    <header className="bg-slate-900 p-8 text-white rounded-b-[3rem] shadow-xl">
                        <div className="max-w-xl mx-auto flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-black text-emerald-400">مرحباً {member.name} 🎥</h1>
                                <p className="text-xs opacity-60">بوابة المصور الشخصية</p>
                            </div>
                            <button onClick={onBack} className="bg-slate-800/50 hover:bg-red-500 transition-colors p-3 rounded-2xl text-xs font-bold">تسجيل خروج</button>
                        </div>
                    </header>

                    <div className="max-w-xl mx-auto p-6 -mt-8 space-y-6">
                        {hasJobTomorrow && (
                            <div className="bg-emerald-600 text-white p-6 rounded-3xl shadow-xl animate-pop">
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="bg-white/20 p-2 rounded-lg">📢</div>
                                    <h3 className="font-black text-lg">لديك عمل غداً!</h3>
                                </div>
                                <div className="space-y-1 opacity-90 text-sm">
                                    <p>📍 <strong>الموقع:</strong> {hasJobTomorrow.location}</p>
                                    <p>🏠 <strong>العنوان:</strong> {hasJobTomorrow.address}</p>
                                </div>
                            </div>
                        )}

                        <div className="grid grid-cols-2 gap-4">
                            <div className="bg-white p-6 rounded-3xl shadow-sm text-center border border-slate-100">
                                <p className="text-slate-400 text-[10px] font-bold mb-1">إجمالي المستحقات</p>
                                <h4 className="text-2xl font-black text-slate-800">{totalEarned} <span className="text-xs">ج.م</span></h4>
                            </div>
                            <div className="bg-white p-6 rounded-3xl shadow-sm text-center border border-slate-100">
                                <p className="text-slate-400 text-[10px] font-bold mb-1">أيام العمل المنفذة</p>
                                <h4 className="text-2xl font-black text-slate-800">{myWork.length} <span className="text-xs">يوم</span></h4>
                            </div>
                        </div>

                        <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 overflow-hidden">
                            <h3 className="font-black mb-4 flex items-center gap-2">📑 سجل العمليات السابقة</h3>
                            {myWork.length === 0 ? (
                                <p className="text-center py-10 text-slate-300 text-sm italic">لا يوجد سجل عمليات حالياً</p>
                            ) : (
                                <div className="space-y-3">
                                    {myWork.map(w => (
                                        <div key={w.id} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                            <div>
                                                <p className="font-bold text-slate-800">{w.date}</p>
                                                <p className="text-[10px] text-slate-400">{w.location}</p>
                                            </div>
                                            <div className="font-black text-emerald-600 bg-emerald-50 px-3 py-1 rounded-xl text-sm">
                                                +{w.staff.find(x => x.id === staffId)?.rate}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
